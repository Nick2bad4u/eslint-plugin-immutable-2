# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: Truffle Hog Secret Scan
run-name: TruffleHog scan (${{ github.event_name }}) by @${{ github.actor }}

on:
    push:
    pull_request:
    merge_group:
        types:
            - checks_requested
    workflow_dispatch:
    schedule:
        - cron: "44 4 * * 0"

permissions:
    contents: read

concurrency:
    group: trufflehog-${{ github.ref }}
    cancel-in-progress: true

jobs:
    trufflehog:
        name: TruffleHog secret scan
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
              with:
                  egress-policy: audit

            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0

            - name: Secret scanning (entire repo)
              uses: trufflesecurity/trufflehog@7c0734f987ad0bb30ee8da210773b800ee2016d3 # v3.93.4
              with:
                  base: ""
                  head: ${{ github.ref_name }}
                  extra_args: --results=verified --exclude-detectors=URI
