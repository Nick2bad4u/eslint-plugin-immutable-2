# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: "Truffle Hog Secret Scan"
run-name: "TruffleHog scan (${{ github.event_name }}) by @${{ github.actor }}"

on:
    push:
    pull_request:
    merge_group:
        types:
            - "checks_requested"
    workflow_dispatch:
    schedule:
        - cron: "44 4 * * 0"

permissions:
    contents: "read"

concurrency:
    group: "trufflehog-${{ github.ref }}"
    cancel-in-progress: true

jobs:
    trufflehog:
        name: "TruffleHog secret scan"
        runs-on: "ubuntu-latest"
        timeout-minutes: 20
        steps:
            - name: "Harden the runner (Audit all outbound calls)"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Checkout code"
              uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
              with:
                  fetch-depth: 0

            - name: "Secret scanning (entire repo)"
              uses: "trufflesecurity/trufflehog@30d5bb91af1a771378349dbbb0c82129392acf70" # v3.95.6
              with:
                  base: ""
                  head: "${{ github.ref_name }}"
                  extra_args: "--results=verified --exclude-detectors=URI"
