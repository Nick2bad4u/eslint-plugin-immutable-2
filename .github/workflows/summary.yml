# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: Summarize New Issues And Pull Requests
run-name: Summarize ${{ github.event_name }} by @${{ github.actor }}

on:
    issues:
        types: [opened, edited]
    pull_request:
        types: [opened, edited, synchronize]
    merge_group:
        types:
            - checks_requested

permissions:
    contents: read
    models: read

concurrency:
    group: summary-${{ github.ref }}
    cancel-in-progress: true

jobs:
    inference:
        name: Generate AI summary comment
        runs-on: ubuntu-latest
        timeout-minutes: 20
        if: github.event_name == 'issues' || (github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]')
        permissions:
            contents: read
            issues: write
            models: read
            pull-requests: write
        defaults:
            run:
                shell: bash

        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
              with:
                  egress-policy: audit

            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Run AI inference
              id: inference
              if: github.event.pull_request.head.repo.full_name == github.repository
              uses: actions/ai-inference@a380166897b5408b8fb7dddd148142794cb5624a # v2.0.6
              with:
                  prompt: |
                      Summarize the following GitHub ${{ github.event_name == 'pull_request' && 'pull request' || 'issue' }} in order to explain it to the project owner:
                      Title: ${{ github.event.pull_request.title || github.event.issue.title }}
                      Body: ${{ github.event.pull_request.body || github.event.issue.body }}

            - name: Comment with AI summary
              run: |
                  if [ "${{ github.event_name }}" = "pull_request" ]; then
                    gh pr comment "$PR_NUMBER" --body "$RESPONSE"
                  else
                    gh issue comment "$ISSUE_NUMBER" --body "$RESPONSE"
                  fi
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  RESPONSE: ${{ steps.inference.outputs.response }}
                  enable-github-mcp: true
                  endpoint: "https://models.github.ai/inference"
                  github-mcp-token: ${{ secrets.GITHUB_TOKEN }}
                  max-tokens: 2000
                  model: gpt-5
                  system-prompt-file: ".github/instructions/copilot-instructions.md"
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Print output
              id: output
              run: |
                  echo "${{ steps.inference.outputs.response }}"
                  echo "${{ steps.inference.outputs.response-file }}"
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
