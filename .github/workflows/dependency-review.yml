# Dependency Review Action
#
# This Action scans dependency manifest changes in pull requests and blocks
# merges when newly introduced vulnerable dependencies violate policy.
#
# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: "Dependency Review"
run-name: Dependency Review (${{ github.event_name }}) by @${{ github.actor }}

on:
    pull_request:
    merge_group:
        types:
            - checks_requested

permissions:
    contents: read

concurrency:
    group: dependency-review-${{ github.ref }}
    cancel-in-progress: true

jobs:
    dependency-review:
        name: Dependency review scan
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
              with:
                  egress-policy: audit

            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Dependency review
              uses: actions/dependency-review-action@05fe4576374b728f0c523d6a13d64c25081e0803 # v4.8.3
              with:
                  fail-on-severity: high
